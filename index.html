  :root {
    --accent: #0ea5e9;
    --accent2: #6366f1;
    --accent3: #10b981;
  }
  * { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; }
  h1,h2,h3,h4,h5 { font-family: 'Syne', sans-serif; }

  /* Dark/Light vars */
  .dark { --bg: #0a0a0f; --bg2: #111118; --bg3: #1a1a24; --text: #f1f5f9; --muted: #94a3b8; --border: rgba(255,255,255,0.08); --card: rgba(255,255,255,0.04); }
  .light { --bg: #f8fafc; --bg2: #ffffff; --bg3: #f1f5f9; --text: #0f172a; --muted: #64748b; --border: rgba(0,0,0,0.08); --card: rgba(0,0,0,0.03); }

  /* Animated gradient text */
  .grad-text {
    background: linear-gradient(135deg, #0ea5e9, #6366f1, #10b981, #0ea5e9);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradShift 4s ease infinite;
  }
  @keyframes gradShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

  /* Floating particles */
  .particle { position:absolute; border-radius:50%; pointer-events:none; animation: floatUp linear infinite; }
  @keyframes floatUp {
    0% { transform: translateY(100vh) scale(0); opacity:0; }
    10% { opacity:0.6; }
    90% { opacity:0.2; }
    100% { transform: translateY(-10vh) scale(1.5); opacity:0; }
  }

  /* Navbar glass */
  .nav-glass {
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    transition: all 0.4s ease;
  }
  .dark .nav-glass { background: rgba(10,10,15,0.7); border-bottom: 1px solid rgba(255,255,255,0.06); }
  .light .nav-glass { background: rgba(248,250,252,0.8); border-bottom: 1px solid rgba(0,0,0,0.06); }

  /* Scroll animations */
  .reveal { opacity:0; transform:translateY(40px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal.visible { opacity:1; transform:translateY(0); }
  .reveal-left { opacity:0; transform:translateX(-50px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal-left.visible { opacity:1; transform:translateX(0); }
  .reveal-right { opacity:0; transform:translateX(50px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal-right.visible { opacity:1; transform:translateX(0); }

  /* Grid hero background */
  .grid-bg {
    background-image: linear-gradient(rgba(14,165,233,0.06) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(14,165,233,0.06) 1px, transparent 1px);
    background-size: 50px 50px;
  }

  /* Skill bar */
  .skill-fill { height:6px; border-radius:3px; width:0%; transition: width 1.5s cubic-bezier(0.4,0,0.2,1); }

  /* Timeline */
  .timeline-dot { position:relative; }
  .timeline-dot::before { content:''; position:absolute; left:-21px; top:6px; width:12px; height:12px; border-radius:50%; background:linear-gradient(135deg,#0ea5e9,#6366f1); box-shadow:0 0 12px rgba(14,165,233,0.6); }
  .timeline-line { position:absolute; left:0; top:0; bottom:0; width:1px; }
  .dark .timeline-line { background:linear-gradient(to bottom, #0ea5e9, #6366f1, transparent); }
  .light .timeline-line { background:linear-gradient(to bottom, #0ea5e9, #6366f1, transparent); }

  /* Card hover */
  .proj-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
  .proj-card:hover { transform: translateY(-8px); }
  .dark .proj-card:hover { box-shadow: 0 20px 60px rgba(14,165,233,0.15); }
  .light .proj-card:hover { box-shadow: 0 20px 60px rgba(14,165,233,0.2); }

  /* Typing cursor */
  .cursor { display:inline-block; width:3px; height:1em; background:#0ea5e9; margin-left:2px; animation:blink 0.8s step-end infinite; vertical-align:middle; }
  @keyframes blink { 50%{opacity:0} }

  /* Glow button */
  .glow-btn {
    position:relative; overflow:hidden;
    background: linear-gradient(135deg, #0ea5e9, #6366f1);
    transition: all 0.3s ease;
  }
  .glow-btn::before {
    content:''; position:absolute; inset:0;
    background: linear-gradient(135deg, #6366f1, #10b981);
    opacity:0; transition:opacity 0.3s ease;
  }
  .glow-btn:hover::before { opacity:1; }
  .glow-btn:hover { box-shadow: 0 0 30px rgba(14,165,233,0.5); transform:scale(1.03); }
  .glow-btn span { position:relative; z-index:1; }

  /* Section tag */
  .section-tag {
    display:inline-flex; align-items:center; gap:8px;
    font-size:12px; font-weight:600; letter-spacing:2px; text-transform:uppercase;
    padding:6px 16px; border-radius:100px;
    background:linear-gradient(135deg,rgba(14,165,233,0.1),rgba(99,102,241,0.1));
    border:1px solid rgba(14,165,233,0.2);
    color:#0ea5e9;
  }

  /* Skill orb */
  .skill-orb {
    transition: all 0.3s ease;
    cursor:default;
  }
  .skill-orb:hover {
    transform: scale(1.1) translateY(-4px);
    box-shadow: 0 8px 30px rgba(14,165,233,0.3);
  }

  /* Booking card */

  .booking-card:hover { transform:scale(1.02); }

  /* Contact input */
  .contact-input {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    transition: border 0.3s, box-shadow 0.3s;
    outline:none;
  }
  .contact-input:focus {
    border-color: rgba(14,165,233,0.5);
    box-shadow: 0 0 0 3px rgba(14,165,233,0.1);

  /* Scrollbar */
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:linear-gradient(#0ea5e9,#6366f1); border-radius:10px; }

  /* Mobile nav */

    100% { transform:scale(1.6); opacity:0; }

  .stat-card::after {

/* ──────────── TYPING EFFECT ──────────── */
function TypeWriter({ words }) {
  const [display, setDisplay] = useState('');
  const [wordIdx, setWordIdx] = useState(0);
  const [charIdx, setCharIdx] = useState(0);
  const [deleting, setDeleting] = useState(false);

  useEffect(() => {
    const word = words[wordIdx];
    const timeout = deleting
      ? setTimeout(() => {
          setDisplay(p => p.slice(0,-1));
          if (display.length === 1) { setDeleting(false); setWordIdx(i => (i+1)%words.length); }
        }, 60)
      : setTimeout(() => {
          setDisplay(word.slice(0, charIdx+1));
          setCharIdx(i => i+1);
          if (charIdx+1 === word.length) setTimeout(() => setDeleting(true), 1800);
        }, 80);
    return () => clearTimeout(timeout);
  }, [display, charIdx, deleting, wordIdx, words]);

  useEffect(() => { if (!deleting) setCharIdx(0); }, [wordIdx]);

  return <span>{display}<span className="cursor"/></span>;
}

/* ──────────── SCROLL REVEAL ──────────── */
function useScrollReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal, .reveal-left, .reveal-right');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); }
      });
    }, { threshold: 0.1 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  });
}

      });
    };
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);

  return (
    <div className={dark ? 'dark' : 'light'} style={{background:'var(--bg)', color:'var(--text)', minHeight:'100vh'}}>
      <Particles dark={dark} />
      <Navbar dark={dark} setDark={setDark} active={active} setActive={setActive} />
      <main>
        <Hero dark={dark} />
        <About dark={dark} />
        <Skills dark={dark} />
        <Experience dark={dark} />
        <Projects dark={dark} />
        <Services dark={dark} />
        <Contact dark={dark} />
      </main>
      <Footer dark={dark} />
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
